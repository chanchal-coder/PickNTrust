<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Extractor - PickNTrust</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .input-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .url-input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .url-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .url-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .extract-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .extract-btn:hover {
            transform: translateY(-2px);
        }
        
        .extract-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #c33;
            margin-top: 20px;
        }
        
        .product-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }
        
        .product-card.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .product-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .product-image {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #e1e5e9;
        }
        
        .product-info {
            flex: 1;
        }
        
        .product-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
            line-height: 1.4;
        }
        
        .price-section {
            margin-bottom: 15px;
        }
        
        .current-price {
            font-size: 2rem;
            font-weight: 700;
            color: #27ae60;
            margin-bottom: 5px;
        }
        
        .original-price {
            font-size: 1.2rem;
            color: #888;
            text-decoration: line-through;
            margin-right: 10px;
        }
        
        .discount {
            background: #e74c3c;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
        }
        
        .source {
            color: #666;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        .example-urls {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .example-urls h4 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .example-urls ul {
            list-style: none;
        }
        
        .example-urls li {
            margin-bottom: 5px;
            color: #666;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .url-input-group {
                flex-direction: column;
            }
            
            .product-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            
            .product-image {
                width: 150px;
                height: 150px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 Product Extractor</h1>
            <p>Paste any product URL to extract pricing and details instantly</p>
        </div>
        
        <div class="input-section">
            <div class="url-input-group">
                <input type="url" class="url-input" id="productUrl" placeholder="Paste product URL here (Amazon, Flipkart, or any e-commerce site)">
                <button class="extract-btn" id="extractBtn" onclick="extractProduct()">Extract Data</button>
            </div>
            
            <div class="example-urls">
                <h4>Supported sites:</h4>
                <ul>
                    <li>• Amazon (amazon.in, amazon.com)</li>
                    <li>• Flipkart (flipkart.com)</li>
                    <li>• Most e-commerce websites</li>
                </ul>
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                Extracting product data... Please wait
            </div>
            
            <div id="error" class="error" style="display: none;"></div>
        </div>
        
        <div class="product-card" id="productCard">
            <div class="product-header">
                <img id="productImage" class="product-image" src="" alt="Product Image">
                <div class="product-info">
                    <h2 class="product-name" id="productName"></h2>
                    <div class="price-section">
                        <div class="current-price" id="currentPrice"></div>
                        <div>
                            <span class="original-price" id="originalPrice"></span>
                            <span class="discount" id="discount"></span>
                        </div>
                    </div>
                    <div class="source" id="source"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isExtracting = false;
        
        // Allow Enter key to trigger extraction
        document.getElementById('productUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !isExtracting) {
                extractProduct();
            }
        });
        
        async function extractProduct() {
            if (isExtracting) return;
            
            const url = document.getElementById('productUrl').value.trim();
            const extractBtn = document.getElementById('extractBtn');
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const productCard = document.getElementById('productCard');
            
            if (!url) {
                showError('Please enter a product URL');
                return;
            }
            
            // Start extraction
            isExtracting = true;
            extractBtn.textContent = 'Extracting...';
            extractBtn.disabled = true;
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            productCard.classList.remove('show');
            
            try {
                const response = await fetch('/extract', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    displayProduct(result.data);
                } else {
                    showError(result.error || 'Failed to extract product data');
                }
                
            } catch (error) {
                showError('Network error. Please check your connection and try again.');
                console.error('Error:', error);
            } finally {
                // Reset button state
                isExtracting = false;
                extractBtn.textContent = 'Extract Data';
                extractBtn.disabled = false;
                loadingDiv.style.display = 'none';
            }
        }
        
        function displayProduct(data) {
            document.getElementById('productName').textContent = data.name;
            document.getElementById('currentPrice').textContent = data.current_price;
            document.getElementById('productImage').src = data.image_url;
            document.getElementById('productImage').alt = data.name;
            document.getElementById('source').textContent = `Source: ${data.source}`;
            
            // Handle original price and discount
            const originalPriceEl = document.getElementById('originalPrice');
            const discountEl = document.getElementById('discount');
            
            if (data.original_price && data.discount_percentage) {
                originalPriceEl.textContent = data.original_price;
                originalPriceEl.style.display = 'inline';
                discountEl.textContent = `${data.discount_percentage} OFF`;
                discountEl.style.display = 'inline-block';
            } else {
                originalPriceEl.style.display = 'none';
                discountEl.style.display = 'none';
            }
            
            document.getElementById('productCard').classList.add('show');
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
